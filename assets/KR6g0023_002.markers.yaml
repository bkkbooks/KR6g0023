  - {type: variant, offset: 7530, length: 746, content: 時迦毘羅等七國王臣不果所願，心懷悲憤，慨戀而還，各至本邑，咸遣使臣同詣拘尸，再求舍利。城人報曰：「世尊慈父既於我界而般涅槃，全身舍利應留永劫於此供養，終不分與外邑諸人。」諸國答曰：「若分者善；若不與者，我等當以彊力奪取。」城人告曰：「徒事鬥諍，終不可得。」闍王復使雨行大臣馳兵請分，告城人曰：「若與者善；若不見分，我加兵力彊奪將去。」答言：「任意。」爾時，拘尸城中所有壯士男女，並閑弓射，即便摠出，嚴整四兵，欲與諸邑交兵合戰。爾時，毘離國諸梨車種遂集四兵，往拘尸城，在一面住；阿勒國諸剎帝利，亦集四兵，在一面住；毘耨國諸婆羅門，亦集四兵，在一面住；遮羅迦羅國諸釋子，亦集四兵，在一面住；師伽國拘樓羅，亦集四兵，在一面住；波肩羅國力士，亦集四兵，往拘尸城，在一面住。爾時，拘尸那城七軍圍遶，為舍利故，各欲奪取。爾時，大眾中有一婆羅門姓煙，在八軍中高聲大唱：「拘尸城諸力士主聽，佛無量劫積善修忍，諸君亦常聞讚忍法，今日何可於佛滅後，為舍利故，起兵相奪？諸君當知此非敬事。舍利現在但當分作八分。」諸力士言：「敬如來議。」爾時，姓煙婆羅門即分舍利以為八分，作八分竟，高聲大唱：「汝諸力士主聽，盛舍利瓶請以見與，欲還頭那羅聚落起瓶塔，華香、幡蓋、伎樂供養。」諸力士答言：「敬從來請。」爾時，必波延那婆羅門居士復以高聲大唱：「拘尸城中諸力士主聽，燒佛處炭與我，欲還本國起炭塔，華香、伎樂供養。」諸力士答婆羅門言：「敬從來請。」爾時，拘尸城諸力士得第一分舍利，即於國中起塔，華香、伎樂種種供養；波肩羅婆國力士得第二分舍利，還歸起塔，種種供養；師伽那婆國拘羅樓眾得第三分舍利，還歸起塔，種種供養；阿勒遮國諸剎帝利得第四分舍利，還國起塔供養；毘耨國諸婆羅門得第五分舍利，還國起塔，種種供養；毘離國諸梨車得第六分舍利，還國起塔，種種供養；遮羅迦羅國諸釋子得第七分舍利，還國起塔，華香供養；摩伽陀主阿闍世王得第八分舍利，還王舍城起塔，華香、伎樂種種供養；姓煙婆羅門得盛舍利瓶，還頭那羅聚落起塔，華香供養；必波羅延那婆羅門居士得炭，還國起塔供養。爾時，閻浮提中八舍利塔、第九瓶塔、第十炭塔，如是分布舍利事已。Q08_p0762c05-0763a19, 大: ''}
